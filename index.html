<!DOCTYPE html>
<html>
<head>
    <title>Radio Player RAGE:MP - SC & Audio</title>
    <style>body { background: transparent; overflow: hidden; margin: 0; }</style>
    <script src="https://w.soundcloud.com/player/api.js"></script>
</head>
<body>
    <iframe id="sc-iframe" width="100%" height="166" scrolling="no" frameborder="no" allow="autoplay" src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/293&auto_play=false"></iframe>
    
    <audio id="html-player"></audio>

    <script>
        const scIframe = document.getElementById('sc-iframe');
        const scWidget = SC.Widget(scIframe);
        const htmlPlayer = document.getElementById('html-player');

        window.addEventListener('message', function(event) {
            try {
                let data = JSON.parse(event.data);
                
                if (data.action === 'play') {
                    let url = data.url;
                    
                    // Zatrzymujemy wszystko na wszelki wypadek
                    scWidget.pause();
                    htmlPlayer.pause();
                    htmlPlayer.src = "";

                    // Sprawdzamy czy to SoundCloud czy Zwykłe Radio
                    if (url.includes("soundcloud.com")) {
                        // Ładujemy SoundCloud bez widoku i z auto-startem
                        scWidget.load(url, { 
                            auto_play: true, buying: false, liking: false, download: false, 
                            sharing: false, show_artwork: false, show_comments: false, 
                            show_playcount: false, show_user: false 
                        });
                    } else {
                        // Ładujemy zwykły strumień (np. radio internetowe .mp3)
                        htmlPlayer.src = url;
                        htmlPlayer.volume = 0.5;
                        htmlPlayer.play();
                    }
                } 
                else if (data.action === 'stop') {
                    scWidget.pause();
                    htmlPlayer.pause();
                    htmlPlayer.src = "";
                } 
                else if (data.action === 'volume') {
                    let v = data.vol;
                    scWidget.setVolume(v); // SoundCloud używa głośności 0-100
                    htmlPlayer.volume = v / 100.0; // HTML5 Player używa 0.0 - 1.0
                }
            } catch(e) {}
        });
    </script>
</body>
</html>
