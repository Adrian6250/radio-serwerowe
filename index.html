<!DOCTYPE html>
<html>
<head>
    <title>Radio Player RAGE:MP</title>
    <style>body { background: transparent; overflow: hidden; margin: 0; }</style>
    <script src="https://w.soundcloud.com/player/api.js"></script>
</head>
<body>
    <iframe id="sc-iframe" width="100%" height="100" scrolling="no" frameborder="no" allow="autoplay" src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/293&auto_play=false"></iframe>
    <audio id="html-player" preload="auto"></audio>

    <script>
        const scWidget = SC.Widget(document.getElementById('sc-iframe'));
        const htmlPlayer = document.getElementById('html-player');

        window.addEventListener('message', function(event) {
            try {
                let data = JSON.parse(event.data);
                if (data.action === 'play') {
                    scWidget.pause(); htmlPlayer.pause();
                    if (data.url.includes("soundcloud.com")) {
                        scWidget.load(data.url, { auto_play: true, show_artwork: false });
                    } else {
                        htmlPlayer.src = data.url;
                        htmlPlayer.play();
                    }
                } else if (data.action === 'stop') {
                    scWidget.pause(); htmlPlayer.pause(); htmlPlayer.src = "";
                } else if (data.action === 'volume') {
                    scWidget.setVolume(data.vol);
                    htmlPlayer.volume = data.vol / 100.0;
                }
            } catch(e) {}
        });

        // Zapobieganie usypianiu odtwarzacza
        setInterval(() => { if(htmlPlayer.paused === false) { let v = htmlPlayer.volume; htmlPlayer.volume = v; } }, 10000);
    </script>
</body>
</html>
