<!DOCTYPE html>
<html>
<head>
    <title>Radio Player RAGE:MP - Final</title>
    <style>
        body { background: transparent; overflow: hidden; margin: 0; }
        /* Mały, pulsujący piksel, który oszukuje oszczędzanie energii Chromium */
        #heartbeat { position: absolute; top: 0; left: 0; width: 1px; height: 1px; background: rgba(255,255,255,0.01); }
    </style>
    <script src="https://w.soundcloud.com/player/api.js"></script>
</head>
<body>
    <div id="heartbeat"></div>
    <iframe id="sc-iframe" width="100%" height="100" scrolling="no" frameborder="no" allow="autoplay" 
        src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/293&auto_play=false"></iframe>
    <audio id="html-player" preload="auto"></audio>

    <script>
        const scWidget = SC.Widget(document.getElementById('sc-iframe'));
        const htmlPlayer = document.getElementById('html-player');
        const heartbeat = document.getElementById('heartbeat');

        // Oszust procesora - zmienia kolor co 500ms
        setInterval(() => {
            heartbeat.style.backgroundColor = heartbeat.style.backgroundColor === 'rgba(255,255,255,0.01)' ? 'rgba(0,0,0,0.01)' : 'rgba(255,255,255,0.01)';
        }, 500);

        window.addEventListener('message', function(event) {
            try {
                let data = JSON.parse(event.data);
                if (data.action === 'play') {
                    scWidget.pause(); 
                    htmlPlayer.pause(); htmlPlayer.src = "";

                    if (data.url.includes("soundcloud.com")) {
                        scWidget.load(data.url, { 
                            auto_play: true, 
                            show_artwork: false,
                            callback: () => {
                                // Sprawdzenie czy to nie jest Preview
                                scWidget.getDuration((dur) => {
                                    if(dur < 40000) { // Jeśli utwór ma mniej niż 40 sek, to na 99% preview
                                        window.parent.postMessage("is_preview", "*");
                                    }
                                });
                            }
                        });
                    } else {
                        htmlPlayer.src = data.url;
                        htmlPlayer.play();
                    }
                } else if (data.action === 'stop') {
                    scWidget.pause(); htmlPlayer.pause();
                } else if (data.action === 'volume') {
                    scWidget.setVolume(data.vol);
                    htmlPlayer.volume = data.vol / 100.0;
                }
            } catch(e) {}
        });
    </script>
</body>
</html>
